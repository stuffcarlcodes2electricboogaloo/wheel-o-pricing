<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel-o-Pricing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Wheel-o-Pricing</h1>
        <p>Spin to reveal a randomly distributed price between $11,000 and $1,000,000.</p>
      </header>

      <section class="game-panel" aria-label="Wheel-o-Pricing game board">
        <div class="wheel-wrapper">
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheel" aria-label="Spinning price wheel"></canvas>
        </div>

        <div class="controls">
          <button id="spinButton" class="spin-button" type="button">Spin the Wheel</button>
          <button id="resetButton" class="reset-button" type="button">Generate New Wheel</button>
          <p id="result" role="status" aria-live="polite">Press “Spin the Wheel” to play.</p>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
